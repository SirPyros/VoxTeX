name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        # npm install rather than npm ci: this lockfile was generated on
        # Windows, and npm's long-standing platform-optional-deps bug
        # (npm/cli#4828) leaves Linux native binaries (@rolldown, @esbuild,
        # lightningcss, typescript-native) out of it. npm ci then "succeeds"
        # but vitest/vite crash at runtime with missing native modules.
        run: npm install

      - name: Test (parser + endpointer)
        run: npm test

      - name: Build (SDK, then demo app)
        run: npm run build

      - name: Drop dev-only element demo page
        run: rm -f apps/web/dist/element-demo.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        # The lockfile is generated on Windows and npm's platform-optional-deps
        # bug (npm/cli#4828) leaves Linux native binaries (@rolldown, @esbuild,
        # lightningcss, typescript-native) out of it — and with the lock
        # present, even `npm install` won't backfill them. The documented
        # workaround is to drop the lock on the CI side.
        run: |
          rm -f package-lock.json
          npm install

      - name: Test (parser + endpointer)
        # On failure, surface the tail of the output as a public annotation
        # (raw Actions logs require sign-in, annotations don't).
        shell: bash
        run: |
          if ! npm test > test-output.txt 2>&1; then
            msg=$(tail -c 2500 test-output.txt)
            msg="${msg//'%'/%25}"; msg="${msg//$'\r'/%0D}"; msg="${msg//$'\n'/%0A}"
            echo "::error::npm test failed:%0A${msg}"
            exit 1
          fi
          tail -n 30 test-output.txt

      - name: Build (SDK, then demo app)
        run: npm run build

      - name: Drop dev-only element demo page
        run: rm -f apps/web/dist/element-demo.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
